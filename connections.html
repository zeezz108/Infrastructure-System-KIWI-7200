<!DOCTYPE html>
<html>
<head>
    <title>Визуализация связей</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', sans-serif; }
        .container { background: white; border-radius: 20px; padding: 30px; margin-top: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        #network { height: 600px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
        .legend { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 20px; height: 20px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-project-diagram"></i> Визуализация связей</h1>
            <a href="/" class="btn btn-primary">Главная</a>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #4CAF50;"></div><span>Агент (онлайн)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #9E9E9E;"></div><span>Агент (оффлайн)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #2196F3;"></div><span>Сервис/Хост</span></div>
            <div class="legend-item"><i class="fas fa-arrow-right"></i><span>Связь</span></div>
        </div>

        <div id="network"></div>

        <div class="mt-3 text-muted">
            <small><i class="fas fa-info-circle"></i> Граф показывает какие сервисы и хосты доступны с каждого агента</small>
        </div>
    </div>

    <script>
        async function loadNetwork() {
            const response = await fetch('/api/connections');
            const data = await response.json();

            const nodes = data.nodes.map(node => ({
                id: node.id,
                label: node.label,
                title: `${node.label} (${node.type})`,
                color: node.type === 'agent'
                    ? (node.status === 'online' ? '#4CAF50' : '#9E9E9E')
                    : '#2196F3',
                shape: node.type === 'agent' ? 'dot' : 'box',
                size: node.type === 'agent' ? 25 : 20
            }));

            const edges = data.edges.map(edge => ({
                from: edge.from,
                to: edge.to,
                label: edge.label,
                arrows: 'to',
                color: '#666',
                font: { size: 10 }
            }));

            const container = document.getElementById('network');
            const networkData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
            const options = {
                nodes: { font: { size: 14 }, borderWidth: 2 },
                edges: { smooth: { type: 'continuous' } },
                physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000 } }
            };

            new vis.Network(container, networkData, options);
        }

        loadNetwork();
    </script>
</body>
</html>
